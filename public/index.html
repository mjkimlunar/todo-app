<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1>Todo</h1>

  <section id="gate">
    <p>가족 코드로 함께 쓰는 할 일 목록이에요. 새로 만들거나, 받은 코드로 참여하세요.</p>
    <div class="gate-row">
      <button type="button" id="create-household-btn">새 가족 만들기</button>
    </div>
    <div class="gate-row">
      <input type="text" id="join-code-input" placeholder="가족 코드 입력 (예: AB12CD)">
      <button type="button" id="join-household-btn">참여하기</button>
    </div>
    <p id="gate-error" class="gate-error"></p>
  </section>

  <div id="app" style="display:none">
    <div class="household-bar">
      <span>가족 코드: <strong id="household-code"></strong></span>
      <button type="button" id="leave-household-btn">다른 가족으로 전환</button>
    </div>

  <form id="todo-form">
    <input type="text" id="title" placeholder="할 일 제목" required>
    <textarea id="description" placeholder="설명 (선택)"></textarea>
    <div class="form-row">
      <label>마감일 <input type="date" id="due_date"></label>
      <label>우선순위
        <select id="priority">
          <option value="low">낮음</option>
          <option value="medium" selected>보통</option>
          <option value="high">높음</option>
        </select>
      </label>
    </div>
    <input type="text" id="tags" placeholder="태그 (쉼표로 구분, 예: 업무, 공부)">
    <button type="submit">추가</button>
  </form>

  <div class="filters">
    <input type="search" id="search" placeholder="제목 검색">
    <select id="tag-filter">
      <option value="">전체 태그</option>
    </select>
    <label><input type="checkbox" id="today-only"> 오늘 할 일만 보기</label>
  </div>

  <ul id="todo-list"></ul>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
