<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header class="app-header">
    <p class="eyebrow">함께 쓰는 할 일</p>
    <h1>Todo<span class="dot">.</span></h1>
  </header>

  <section id="auth-gate">
    <div class="gate-row">
      <button type="button" id="demo-btn">체험하기 (테스트 계정으로 둘러보기)</button>
    </div>
    <p class="gate-switch" style="margin-bottom: 16px">가입 없이 바로 기능을 둘러보실 수 있어요.</p>

    <div id="signup-form" style="display:none">
      <p>이메일과 비밀번호로 가입하세요.</p>
      <div class="gate-row">
        <input type="email" id="signup-email" placeholder="이메일">
      </div>
      <div class="gate-row">
        <input type="password" id="signup-password" placeholder="비밀번호 (6자 이상)">
      </div>
      <div class="gate-row">
        <button type="button" id="signup-btn">가입하기</button>
      </div>
      <p class="gate-switch">이미 계정이 있나요? <a href="#" id="show-login-link">로그인</a></p>
      <p id="signup-message" class="gate-message"></p>
    </div>

    <div id="login-form">
      <p>이메일과 비밀번호로 로그인하세요.</p>
      <div class="gate-row">
        <input type="email" id="login-email" placeholder="이메일">
      </div>
      <div class="gate-row">
        <input type="password" id="login-password" placeholder="비밀번호">
      </div>
      <div class="gate-row">
        <button type="button" id="login-btn">로그인</button>
      </div>
      <p class="gate-switch">계정이 없나요? <a href="#" id="show-signup-link">가입하기</a></p>
      <p class="gate-switch"><a href="#" id="show-forgot-link">비밀번호를 잊으셨나요?</a></p>
    </div>

    <div id="forgot-form" style="display:none">
      <p>가입한 이메일로 비밀번호 재설정 링크를 보내드려요.</p>
      <div class="gate-row">
        <input type="email" id="forgot-email" placeholder="이메일">
      </div>
      <div class="gate-row">
        <button type="button" id="forgot-btn">재설정 이메일 보내기</button>
      </div>
      <p class="gate-switch"><a href="#" id="show-login-from-forgot-link">로그인으로 돌아가기</a></p>
      <p id="forgot-message" class="gate-message"></p>
    </div>

    <p id="auth-error" class="gate-error"></p>
  </section>

  <section id="gate" style="display:none">
    <p>모임 코드로 함께 쓰는 할 일 목록이에요. 새로 만들거나, 받은 코드로 참여하세요.</p>
    <div class="gate-row">
      <button type="button" id="create-household-btn">새 모임 만들기</button>
    </div>
    <div class="gate-row">
      <input type="text" id="join-code-input" placeholder="모임 코드 입력 (예: AB12CD)">
      <button type="button" id="join-household-btn">참여하기</button>
    </div>
    <p id="gate-error" class="gate-error"></p>
  </section>

  <div id="app" style="display:none">
    <div class="household-bar">
      <span>모임 코드: <strong id="household-code"></strong></span>
      <span>
        <button type="button" id="leave-household-btn">다른 모임으로 전환</button>
        <button type="button" id="logout-btn">로그아웃</button>
      </span>
    </div>

    <section id="admin-panel" style="display:none">
      <p>관리자예요. 이메일로 초대할 수 있어요.</p>
      <div class="gate-row">
        <input type="email" id="invite-email-input" placeholder="초대할 이메일">
        <button type="button" id="invite-btn">초대 이메일 보내기</button>
      </div>
      <p id="invite-message" class="gate-message"></p>
    </section>

  <form id="todo-form">
    <input type="text" id="title" placeholder="할 일 제목" required>
    <textarea id="description" placeholder="설명 (선택)"></textarea>
    <div class="form-row">
      <label>마감일 <input type="date" id="due_date"></label>
      <label>우선순위
        <select id="priority">
          <option value="low">낮음</option>
          <option value="medium" selected>보통</option>
          <option value="high">높음</option>
        </select>
      </label>
    </div>
    <input type="text" id="tags" placeholder="태그 (쉼표로 구분, 예: 업무, 공부)">
    <button type="submit">추가</button>
  </form>

  <div class="filters">
    <input type="search" id="search" placeholder="제목 검색">
    <select id="tag-filter">
      <option value="">전체 태그</option>
    </select>
    <label><input type="checkbox" id="today-only"> 오늘 할 일만 보기</label>
  </div>

  <ul id="todo-list"></ul>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
