<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비밀번호 재설정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header class="app-header">
    <p class="eyebrow">함께 쓰는 할 일</p>
    <h1>Todo<span class="dot">.</span></h1>
  </header>

  <section id="reset-gate">
    <div id="reset-form">
      <p>새 비밀번호를 입력해주세요.</p>
      <div class="gate-row">
        <input type="password" id="new-password" placeholder="새 비밀번호 (6자 이상)">
      </div>
      <div class="gate-row">
        <input type="password" id="new-password-confirm" placeholder="새 비밀번호 확인">
      </div>
      <div class="gate-row">
        <button type="button" id="reset-btn">비밀번호 변경</button>
      </div>
    </div>
    <p id="reset-message" class="gate-message"></p>
    <p id="reset-error" class="gate-error"></p>
  </section>
</main>
<script src="reset-password.js"></script>
</body>
</html>
